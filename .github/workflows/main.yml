name: M.I.K.U. Core // Cyberpunk GUI Forge

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-gui-agent:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Bağımlılıkları Kur
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: PyInstaller ile Noconsole GUI Döv
      run: |
        # --noconsole                : Siyah CMD kutusunu tamamen yok eder, sadece modern arayüz açılır.
        # --collect-all customtkinter: Arayüzün modern temalarını ve yuvarlak buton grafiklerini paketler.
        pyinstaller --onefile --noconsole --clean --collect-all customtkinter --hidden-import pyttsx3.drivers.sapi5 --name "MIKU_OS_v1" agent.py

    - uses: actions/upload-artifact@v4
      with:
        name: MIKU-Cyber-Ajan-v1
        path: dist/MIKU_OS_v1.exe
        compression-level: 0
