name: M.I.K.U. Core // Autonomous EXE Factory

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # BÜYÜK NİMET: GitHub sayfasından "Tıkla ve .EXE üret" butonu ekler!

jobs:
  forge-windows-executable:
    runs-on: windows-latest

    steps:
    - name: 1. Kodu Fabrika Makinesine Çek
      uses: actions/checkout@v4

    - name: 2. Python 3.11 Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: 3. Gerekli Kütüphaneleri ve Derleyiciyi Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller ruff

    - name: 4. Ruff Linter Slap Engelleme (Otomatik Formatla)
      run: |
        # Kodu kontrol edip kırma; makine belleğindeyken direkt kendi istediğin gibi düzelt:
        ruff format .

    - name: 5. PyInstaller ile Tek Parça .EXE Döv
      run: |
        # --onefile : Her şeyi tek bir .exe içine sıkıştır
        # --clean   : Derleme çöplerini temizle
        pyinstaller --onefile --clean --name "MIKU_Core_v01" agent.py

    - name: 6. Oluşan .EXE'yi Ganimet Olarak GitHub'a Yükle
      uses: actions/upload-artifact@v4
      with:
        name: MIKU-Windows-Ajan-v01
        path: dist/MIKU_Core_v01.exe
        compression-level: 0 # 0 = Bekletmeden saniyeler içinde upload et
