name: M.I.K.U. Core // Live Deep-Scan Forge

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-live-agent:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: 1. Bağımlılıkları ve Derleyiciyi Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 2. PyInstaller ile Zırhlı Live-Scraper .EXE Döv
      run: |
        # --collect-all customtkinter     : Modern arayüz temaları için
        # --collect-all duckduckgo_search : Canlı arama motorunun gizli SSL kalkanlarını .exe'ye gömmek için!
        pyinstaller --onefile --noconsole --clean --collect-all customtkinter --collect-all duckduckgo_search --hidden-import pyttsx3.drivers.sapi5 --name "MIKU_DeepScan_v1.2" agent.py

    - name: 3. Üretilen Siber Ajanı GitHub'a Yükle
      uses: actions/upload-artifact@v4
      with:
        name: MIKU-Live-Ajan-v1.2
        path: dist/MIKU_DeepScan_v1.2.exe
        compression-level: 0
